<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票详情 - E-Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">E-Vote</a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn btn-outline-light btn-sm me-2">返回列表</a>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">退出</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <div id="pollInfo">
                            <h3 id="pollTitle" class="mb-2">加载中...</h3>
                            <p class="text-muted" id="pollDesc"></p>
                            <div class="d-flex gap-3 mb-3">
                                <span class="badge bg-primary" id="pollType">单选</span>
                                <span class="badge bg-secondary" id="pollStatus">进行中</span>
                                <span class="badge bg-info" id="pollEndTime"></span>
                            </div>
                        </div>

                        <hr>

                        <div id="votedInfo" class="alert alert-success" style="display:none;">
                            ✅ 您已参与本次投票，<a href="result.html?id=" id="resultLink">查看结果</a>
                        </div>

                        <form id="voteForm">
                            <div id="optionsContainer"></div>
                            <div id="errorMsg" class="text-danger mb-3" style="display:none;"></div>
                            <button type="submit" class="btn btn-primary" id="submitBtn">提交投票</button>
                            <a href="result.html" class="btn btn-outline-secondary ms-2" id="viewResultBtn">查看结果</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/poll.js"></script>
</body>
</html>
