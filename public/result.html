<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票结果 - E-Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="css/style.css" rel="stylesheet">
    <style>
        .chart-container { height: 400px; }
        .result-item { transition: all 0.3s; }
        .result-item:hover { background-color: #f8f9fa; }
        .progress { height: 25px; border-radius: 12px; }
        .progress-bar { transition: width 0.5s ease; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">E-Vote</a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn btn-outline-light btn-sm me-2">返回列表</a>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">退出</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 id="resultTitle" class="text-center mb-2">加载中...</h3>
                        <p class="text-center text-muted mb-4">总参与人数：<span id="totalVoters">0</span> 人</p>

                        <div class="mb-4">
                            <div class="btn-group w-100" role="group">
                                <button type="button" class="btn btn-outline-primary active" id="chartPie">饼图</button>
                                <button type="button" class="btn btn-outline-primary" id="chartBar">柱状图</button>
                            </div>
                        </div>

                        <div class="chart-container" id="chartContainer"></div>

                        <hr class="my-4">

                        <h5 class="mb-3">📊 详细数据</h5>
                        <div id="resultList"></div>

                        <div class="text-center mt-4">
                            <span class="text-muted" id="liveTip">⏳ 数据每秒自动刷新</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/result.js"></script>
</body>
</html>
