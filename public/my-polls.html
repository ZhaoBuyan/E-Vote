<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的投票 - E-Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">E-Vote</a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn btn-outline-light btn-sm me-2">返回列表</a>
                <a href="create-poll.html" class="btn btn-light btn-sm me-2">创建投票</a>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">退出</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h4 class="mb-3">📋 我创建的投票</h4>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>标题</th>
                        <th>类型</th>
                        <th>状态</th>
                        <th>参与人数</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="pollList">
                    <tr><td colspan="6" class="text-center text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <nav>
            <ul class="pagination justify-content-end" id="pagination"></ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/my-polls.js"></script>
</body>
</html>
