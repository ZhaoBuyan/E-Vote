<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建投票 - E-Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .template-btn {
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #dee2e6;
            background: #f8f9fa;
            color: #495057;
        }
        .template-btn:hover {
            background: #e3f2fd;
            border-color: #0d47a1;
            color: #0d47a1;
            transform: translateY(-1px);
        }
        .template-btn:active {
            transform: scale(0.96);
        }
        .template-section {
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .ai-status-text {
            font-size: 0.85rem;
            margin-top: 4px;
        }
        #aiGenerateBtn {
            white-space: nowrap;
        }
        .title-input-group {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }
        .title-input-group .form-control {
            flex: 1;
        }
        .title-input-group .btn {
            flex-shrink: 0;
        }
        .batch-input-area textarea {
            font-size: 0.9rem;
            resize: vertical;
            min-height: 120px;
        }
        .batch-input-area .btn {
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">E-Vote</a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn btn-outline-light btn-sm me-2">返回列表</a>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">退出</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="mb-3">📝 创建新投票</h4>

                        <form id="createPollForm">
                            <!-- ====== 标题 + AI 生成按钮（同一行） ====== -->
                            <div class="mb-2">
                                <label class="form-label fw-bold">投票标题 <span class="text-danger">*</span></label>
                                <div class="title-input-group">
                                    <input type="text" class="form-control" id="pollTitle" placeholder="请输入投票标题" required>
                                    <button type="button" class="btn btn-primary" id="aiGenerateBtn">
                                        ✨ AI 生成
                                    </button>
                                </div>
                                <div id="aiStatus" class="ai-status-text text-muted"></div>
                            </div>

                            <!-- ====== 快速模板 ====== -->
                            <div class="template-section mb-3">
                                <span class="text-muted me-2" style="font-size:0.85rem;">📋 快速模板：</span>
                                <button type="button" class="template-btn" data-topic="年会节目，选出最受欢迎的表演">🎭 年会</button>
                                <button type="button" class="template-btn" data-topic="优秀员工评选，评价反馈传达与改正工作能力">🏆 评选</button>
                                <button type="button" class="template-btn" data-topic="员工能力评价：反馈传达与改正工作表现">📊 能力评价</button>
                                <button type="button" class="template-btn" data-topic="团建活动方案选择">🏕️ 团建</button>
                                <button type="button" class="template-btn" data-topic="最佳创意方案征集">💡 创意</button>
                            </div>

                            <!-- ====== 投票说明 ====== -->
                            <div class="mb-3">
                                <label class="form-label">投票说明</label>
                                <textarea class="form-control" id="pollDesc" rows="3" placeholder="请输入投票说明（AI 会自动生成）"></textarea>
                            </div>

                            <!-- ====== 投票类型 + 截止时间 ====== -->
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">投票类型</label>
                                    <select class="form-select" id="pollType">
                                        <option value="single">单选</option>
                                        <option value="multi">多选</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">截止时间</label>
                                    <input type="datetime-local" class="form-control" id="pollEndTime">
                                </div>
                            </div>

                            <!-- ====== 匿名选项 ====== -->
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="isAnonymous">
                                <label class="form-check-label" for="isAnonymous">匿名投票（不公开投票人）</label>
                            </div>

                            <hr>

                            <!-- ====== 选项管理 ====== -->
                            <label class="form-label fw-bold">选项 <span class="text-danger">*</span>（至少2个）</label>
                            <div id="optionsContainer">
                                <div class="input-group mb-2 option-item">
                                    <input type="text" class="form-control" placeholder="选项 1" required>
                                    <button class="btn btn-outline-danger" type="button" onclick="removeOption(this)">✕</button>
                                </div>
                                <div class="input-group mb-2 option-item">
                                    <input type="text" class="form-control" placeholder="选项 2" required>
                                    <button class="btn btn-outline-danger" type="button" onclick="removeOption(this)">✕</button>
                                </div>
                            </div>
                            <button type="button" class="btn btn-outline-secondary btn-sm mb-3" onclick="addOption()">+ 添加选项</button>

                            <div id="errorMsg" class="text-danger mb-3" style="display:none;"></div>

                            <!-- ====== 提交按钮 ====== -->
                            <button type="submit" class="btn btn-primary">创建投票</button>
                            <a href="/" class="btn btn-outline-secondary ms-2">取消</a>
                        </form>

                        <!-- ====== 底部：批量填充区域 ====== -->
                        <hr class="my-4">
                        <div class="card bg-light border-0 batch-input-area">
                            <div class="card-body">
                                <h6 class="mb-2">📋 批量填充（快速导入）</h6>
                                <p class="text-muted small mb-2">
                                    按行输入：第一行标题，第二行说明，第三行起每行一个选项。
                                    <span class="badge bg-info text-white">AI 自动优化</span>
                                </p>
                                <textarea class="form-control font-monospace" id="batchInput" rows="5" 
                                    placeholder="示例：&#10;最佳员工评选&#10;请选出你心目中的年度最佳员工&#10;张三&#10;李四&#10;王五&#10;赵六"></textarea>
                                <div class="mt-2 d-flex gap-2 flex-wrap">
                                    <button type="button" class="btn btn-outline-primary btn-sm" id="batchFillBtn">
                                        ⚡ 填充到表单
                                    </button>
                                    <button type="button" class="btn btn-outline-success btn-sm" id="batchOptimizeBtn">
                                        🤖 AI 优化后填充
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary btn-sm" id="batchClearBtn">
                                        🗑️ 清空
                                    </button>
                                    <span id="batchStatus" class="text-muted small align-self-center ms-2"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/create-poll.js"></script>
</body>
</html>
